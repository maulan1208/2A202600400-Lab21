name: MLOps Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # TODO 1: Viet lenh de chay pytest tren thu muc tests/ voi co -v
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    env:
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        # TODO 2: Ghi noi dung credentials ra file tam va set bien moi truong xac thuc.
        # GCP:   echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
        #        echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
        # AWS:   echo "AWS_ACCESS_KEY_ID=..." >> $GITHUB_ENV  (lay tu secrets)
        #        echo "AWS_SECRET_ACCESS_KEY=..." >> $GITHUB_ENV
        # Azure: echo "AZURE_STORAGE_CONNECTION_STRING=..." >> $GITHUB_ENV
        run: |
          # Ghi secret ra file tạm
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          
          # Cấu hình biến môi trường cho cả Shell và các thư viện Python (gcsfs)
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV

      - name: Pull data with DVC
        # TODO 3: Pull cac file du lieu can thiet tu cloud storage bang lenh dvc pull.
        #         Chi pull train_phase1.csv va eval.csv (khong can train_phase2.csv).
        run: 
          # Ép DVC sử dụng file key này cho remote 'storage' (tên remote bạn đặt khi setup DVC)
          # Sử dụng --local để không ghi đè vào file dvc config chính
          dvc remote modify storage credentialpath /tmp/sa-key.json --local
          dvc remote modify myremote credentialpath /tmp/sa-key.json --local
          dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc
      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 4: Doc gia tri "accuracy" tu outputs/metrics.json bang Python inline.
        #         Set ket qua thanh output "accuracy" de job deploy co the doc.
        #
        # Goi y:
        #   ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
        #   echo "accuracy=$ACC" >> $GITHUB_OUTPUT
        run: |
          acc=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$acc" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        # TODO 5: Su dung cloud SDK de upload models/model.pkl len
        #         <bucket>/models/latest/model.pkl.
        #         Ten bucket lay tu secret CLOUD_BUCKET.
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          client = storage.Client()
          bucket = client.bucket("${{ secrets.CLOUD_BUCKET }}")
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          print("Upload model thành công!")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        # TODO 6: Doc accuracy tu output cua job train.
        #         Neu accuracy < 0.70, ket thuc voi loi ro rang.
        #         Neu dat nguong, in thong bao va tiep tuc.
        #
        # Goi y:
        #   acc = float("${{ needs.train.outputs.accuracy }}")
        #   if acc < 0.70:
        #       raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")
        #   print("PASSED: dang trien khai model.")
        run: |
          python - <<'EOF'
          import sys
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          print(f"Current Accuracy: {accuracy}")
          if accuracy < 0.70:
              print("LỖI: Accuracy không đạt yêu cầu (0.70)!")
              sys.exit(1)
          print("ĐẠT: Accuracy đủ điều kiện để triển khai.")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
           

            sudo systemctl restart mlops-serve

            echo "Đang chờ server khởi động..."
            sleep 5
            if curl -s http://localhost:8000/health | grep '"status":"ok"'; then
                echo "Health check passed."
            else
                echo "Health check failed!"
                exit 1
            fi
